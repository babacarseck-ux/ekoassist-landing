<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#1A3D2B"/>

  <!-- ── Letter E ── -->
  <!-- Vertical stroke -->
  <rect x="12" y="13" width="8" height="74" rx="4" fill="#FFFFFF"/>
  <!-- Top bar -->
  <rect x="12" y="13" width="38" height="8" rx="4" fill="#FFFFFF"/>
  <!-- Middle bar -->
  <rect x="12" y="42" width="28" height="7" rx="3.5" fill="#FFFFFF"/>
  <!-- Bottom bar -->
  <rect x="12" y="79" width="38" height="8" rx="4" fill="#FFFFFF"/>

  <!-- ── Bar chart (between middle and bottom bar of E) ── -->
