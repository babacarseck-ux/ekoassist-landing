  <rect x="21" y="68" width="7" height="11" rx="2.5" fill="#6DD5AA"/>
  <!-- Medium bar -->
  <rect x="31" y="61" width="7" height="18" rx="2.5" fill="#6DD5AA"/>
  <!-- Tall bar -->
  <rect x="41" y="54" width="7" height="25" rx="2.5" fill="#6DD5AA"/>

  <!-- ── Letter A (triangle) ── -->
  <path d="M56 87 L72 13 L88 87"
    stroke="#6DD5AA" stroke-width="7"
