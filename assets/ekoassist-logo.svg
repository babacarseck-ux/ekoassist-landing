<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 96" fill="none">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&amp;display=swap');
  </style>
</defs>

  <!-- ── Icon (96×96) ── -->
  <rect width="96" height="96" rx="21" fill="#1A3D2B"/>

  <!-- Letter E: vertical -->
  <rect x="11" y="12" width="8" height="72" rx="4" fill="#FFFFFF"/>
  <!-- E: top bar -->
  <rect x="11" y="12" width="37" height="8" rx="4" fill="#FFFFFF"/>
  <!-- E: middle bar -->
  <rect x="11" y="41" width="27" height="7" rx="3.5" fill="#FFFFFF"/>
  <!-- E: bottom bar -->
  <rect x="11" y="76" width="37" height="8" rx="4" fill="#FFFFFF"/>

  <!-- Bar chart (between middle and bottom bar) -->
  <rect x="20" y="65" width="7" height="11" rx="2.5" fill="#6DD5AA"/>
  <rect x="30" y="58" width="7" height="18" rx="2.5" fill="#6DD5AA"/>
  <rect x="40" y="51" width="7" height="25" rx="2.5" fill="#6DD5AA"/>

  <!-- Letter A: triangle -->
  <path d="M54 84 L69 12 L84 84"
    stroke="#6DD5AA" stroke-width="6.5"
    stroke-linecap="round" stroke-linejoin="round"
    fill="none"/>
  <!-- A crossbar -->
  <line x1="61" y1="61" x2="77" y2="61"
    stroke="#6DD5AA" stroke-width="5.5"
    stroke-linecap="round"/>

  <!-- ── Wordmark ── -->
  <!-- "Eko" -->
  <text x="114" y="58"
    font-family="'Nunito', 'Segoe UI', -apple-system, Arial, sans-serif"
    font-size="44" font-weight="800" fill="#1A3D2B" letter-spacing="-0.5">Eko</text>
  <!-- "A" accent in mint -->
  <text x="201" y="58"
    font-family="'Nunito', 'Segoe UI', -apple-system, Arial, sans-serif"
    font-size="44" font-weight="800" fill="#6DD5AA" letter-spacing="-0.5">A</text>
  <!-- "ssist" -->
  <text x="226" y="58"
    font-family="'Nunito', 'Segoe UI', -apple-system, Arial, sans-serif"
    font-size="44" font-weight="800" fill="#1A3D2B" letter-spacing="-0.5">ssist</text>

  <!-- ── Tagline ── -->
  <text x="116" y="80"
    font-family="'Nunito', 'Segoe UI', -apple-system, Arial, sans-serif"
    font-size="14" font-weight="600" fill="#5A7A6A" letter-spacing="0.3">Din personliga ekonomiassistent</text>

</svg>
